services:

  php:
    build:
      context: ./salute-backend
      dockerfile: Dockerfile
    container_name: salute_php
    volumes:
      - ./salute-backend:/var/www/html
    networks:
      - salute_net
    depends_on:
      - mysql
    environment:
      TZ: Europe/Madrid

  nginx:
    image: nginx:alpine
    container_name: salute_nginx
    ports:
      - "8080:80"
    volumes:
      - ./salute-backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - salute_net
    depends_on:
      - php

  mysql:
      image: mysql:8.0
      container_name: salute_mysql
      restart: always
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: salute_db
        MYSQL_USER: salute_user
        MYSQL_PASSWORD: salute_pass
        TZ: Europe/Madrid
      ports:
        - "3306:3306"
      volumes:
        - salute_mysql_data:/var/lib/mysql
      networks:
        - salute_net

  mailpit:
    image: axllent/mailpit
    container_name: salute_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - salute_net

networks:
  salute_net:
    driver: bridge

volumes:
  salute_mysql_data: